name: Airman CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: airman
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn sqlalchemy psycopg2-binary pytest flake8

      - name: Lint Check
        run: flake8 app

      - name: Start API
        run: |
          uvicorn app.main:app --port 8000 &
          sleep 5

      - name: Eval Smoke Test
        run: |
          curl -X POST http://127.0.0.1:8000/eval/run